name: beta release

on:
  push:
    branches: [ 'main' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  changelog:
    strategy:
      matrix:
        platform: [ ubuntu-latest ]
        go-version: [ '1.21' ]
    name: Beta Release Changelog
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update ref
        id: create-or-update-ref
        uses: ovsds/create-or-update-ref-action@v1
        with:
          ref: tags/beta
          sha: ${{ github.sha }}

      - name: Delete beta tag
        run: git tag -d beta
        continue-on-error: true

      - name: changelog # or changelogithub@0.12 if ensure the stable result
        id: changelog
        run: |
          git tag -l
          echo "11" > CHANGELOG.md
#          npx changelogen@latest --output CHANGELOG.md

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: CHANGELOG.md
          prerelease: true
          tag_name: beta

  release:
    needs:
      - changelog
    strategy:
      matrix:
        include:
          - target: '!(*musl*|*windows-arm64*|*android*|*freebsd*)' # xgo
            hash: "md5"
          - target: 'linux-!(arm*)-musl*' #musl-not-arm
            hash: "md5-linux-musl"
          - target: 'linux-arm*-musl*' #musl-arm
            hash: "md5-linux-musl-arm"
          - target: 'windows-arm64' #win-arm64
            hash: "md5-windows-arm64"
          - target: 'android-*' #android
            hash: "md5-android"
          - target: 'freebsd-*' #freebsd
            hash: "md5-freebsd"

    name: Beta Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Go mod tidy
        run: go mod tidy
        
      - name: Install build tools
        run: |
          sudo snap install zig --classic --beta
          go install github.com/crazy-max/xgo@latest
          sudo apt-get update
          sudo apt-get install -y upx
          sudo ln -s $(which xgo) /usr/local/bin/xgo
          sudo ln -s $(which zig) /usr/local/bin/zig
          sudo ln -s $(which upx) /usr/local/bin/upx
          export PATH=$PATH:$(go env GOPATH)/bin:/usr/local/bin
          echo "PATH=$PATH" >> $GITHUB_ENV
        
      - name: Setup web
        run: bash build.sh dev web

      - name: Build
        run: |
          export BASE="https://download.wireguard.com/qemu-test/toolchains/20211123/"
          TARGET="${{ matrix.target }}"
          case "$TARGET" in
            *musl*)
              if [[ "$TARGET" == *"arm"* ]]; then
                curl -L -o musl.tgz "${BASE}arm-linux-musleabihf-cross.tgz"
              else
                curl -L -o musl.tgz "${BASE}x86_64-linux-musl-cross.tgz"
              fi
              sudo tar xf musl.tgz --strip-components 1 -C /usr/local
              rm -f musl.tgz
              ;;
          esac
          
          # Set build environment variables
          if [[ "$TARGET" == *"-"* ]]; then
            GOOS="${TARGET%%-*}"
            GOARCH="${TARGET##*-}"
            if [[ "$TARGET" == *"arm"* ]]; then
              GOARM="${TARGET#*-arm}"
              GOARM="${GOARM%%-*}"
            fi
          else
            GOOS="$TARGET"
            GOARCH="amd64"
          fi
          
          if [[ "$TARGET" == *"musl"* ]]; then
            export CGO_ENABLED=1
            if [[ "$TARGET" == *"arm"* ]]; then
              export CC=arm-linux-musleabihf-gcc
            else
              export CC=x86_64-linux-musl-gcc
            fi
          fi
          
          export GOOS
          export GOARCH
          if [[ -n "$GOARM" ]]; then
            export GOARM
          fi
          
          echo "Building for GOOS=$GOOS GOARCH=$GOARCH${GOARM:+ GOARM=$GOARM}"
          
          # Build
          go build -o "build/alist-$TARGET" -ldflags="-w -s" -tags=jsoniter .
          
          # Compress if needed
          if [[ "$TARGET" == "linux-amd64" ]]; then
            upx -9 "build/alist-$TARGET"
          elif [[ "$TARGET" == "windows-amd64" ]]; then
            cp "build/alist-$TARGET.exe" "build/alist-$TARGET-upx.exe"
            upx -9 "build/alist-$TARGET-upx.exe"
          fi

      - name: Compress
        run: |
          bash build.sh zip ${{ matrix.hash }}
          
      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/compress/*
          prerelease: true
          tag_name: beta
