name: build

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest]
        target: 
          - darwin-amd64
          - darwin-arm64
          - windows-amd64
          - linux-arm64-musl
          - linux-amd64-musl
          - windows-arm64
          - android-arm64
          - windows-win7-amd64
    name: Build
    runs-on: ${{ matrix.platform }}
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Go mod tidy
        run: go mod tidy
        
      - name: Install build tools
        run: |
          sudo snap install zig --classic --beta
          go install github.com/crazy-max/xgo@latest
          sudo apt-get update
          sudo apt-get install -y upx
          sudo ln -s $(which xgo) /usr/local/bin/xgo
          sudo ln -s $(which zig) /usr/local/bin/zig
          sudo ln -s $(which upx) /usr/local/bin/upx
          export PATH=$PATH:$(go env GOPATH)/bin:/usr/local/bin
          echo "PATH=$PATH" >> $GITHUB_ENV
        
      - name: Setup web
        run: bash build.sh dev web
      - name: Install MinGW for Win7 build
        if: matrix.target == 'windows-win7-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Build Win7 Binary
        if: matrix.target == 'windows-win7-amd64'
        run: |
          bash build.sh release win7
          mkdir -p build

      - name: Build
        if: matrix.target != 'windows-win7-amd64'
        run: |
          export BASE="https://download.wireguard.com/qemu-test/toolchains/20211123/"
          TARGET="${{ matrix.target }}"
          case "$TARGET" in
            *musl*)
              if [[ "$TARGET" == *"arm"* ]]; then
                curl -L -o musl.tgz "${BASE}arm-linux-musleabihf-cross.tgz"
              else
                curl -L -o musl.tgz "${BASE}x86_64-linux-musl-cross.tgz"
              fi
              sudo tar xf musl.tgz --strip-components 1 -C /usr/local
              rm -f musl.tgz
              ;;
          esac
          
          # Set build environment variables
          if [[ "$TARGET" == *"-"* ]]; then
            GOOS="${TARGET%%-*}"
            GOARCH="${TARGET##*-}"
            if [[ "$TARGET" == *"arm"* ]]; then
              GOARM="${TARGET#*-arm}"
              GOARM="${GOARM%%-*}"
            fi
          else
            GOOS="$TARGET"
            GOARCH="amd64"
          fi
          
          if [[ "$TARGET" == *"musl"* ]]; then
            export CGO_ENABLED=1
            if [[ "$TARGET" == *"arm"* ]]; then
              export CC=arm-linux-musleabihf-gcc
            else
              export CC=x86_64-linux-musl-gcc
            fi
          fi
          
          export GOOS
          export GOARCH
          if [[ -n "$GOARM" ]]; then
            export GOARM
          fi
          
          echo "Building for GOOS=$GOOS GOARCH=$GOARCH${GOARM:+ GOARM=$GOARM}"
          
          # Build
          go build -o "build/alist-$TARGET" -ldflags="-w -s" -tags=jsoniter .
          
          # Compress if needed
          if [[ "$TARGET" == "linux-amd64" ]]; then
            upx -9 "build/alist-$TARGET"
          elif [[ "$TARGET" == "windows-amd64" ]]; then
            cp "build/alist-$TARGET.exe" "build/alist-$TARGET-upx.exe"
            upx -9 "build/alist-$TARGET-upx.exe"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alist_${{ env.SHA }}_${{ matrix.target }}
          path: build/*
